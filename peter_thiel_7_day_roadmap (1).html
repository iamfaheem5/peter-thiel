<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peter Thiel — 7-Day Reading Roadmap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --bg2: #f2f1ed;
    --bg3: #e8e6e0;
    --text: #1a1917;
    --text2: #6b6962;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --success-border: #c0dd97;
    --info-bg: #e6f1fb;
    --info-text: #185fa5;
    --info-border: #b5d4f4;
    --warn-bg: #faeeda;
    --warn-text: #854f0b;
    --warn-border: #fac775;
    --radius: 10px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1917;
      --bg2: #222120;
      --bg3: #2c2b29;
      --text: #e8e6e0;
      --text2: #9c9a92;
      --text3: #6b6962;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --success-bg: #173404;
      --success-text: #c0dd97;
      --success-border: #3b6d11;
      --info-bg: #042c53;
      --info-text: #b5d4f4;
      --info-border: #185fa5;
      --warn-bg: #412402;
      --warn-text: #fac775;
      --warn-border: #854f0b;
    }
  }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 680px; margin: 0 auto; }

  /* Header */
  .page-header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .page-header .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .page-header h1 {
    font-size: 28px;
    font-weight: normal;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 8px;
  }
  .page-header h1 em { font-style: italic; color: var(--text2); }
  .page-header p { font-size: 14px; color: var(--text2); font-family: 'Courier New', monospace; }

  /* Progress */
  .progress-wrap { margin-bottom: 2rem; }
  .progress-row { display: flex; justify-content: space-between; font-size: 12px; font-family: 'Courier New', monospace; color: var(--text3); margin-bottom: 6px; }
  .progress-track { height: 2px; background: var(--border2); border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--success-text); border-radius: 1px; transition: width .4s ease; width: 0%; }

  /* Timeline */
  .timeline { position: relative; padding-left: 44px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 24px;
    bottom: 24px;
    width: 1px;
    background: var(--border2);
  }

  .day-block { position: relative; margin-bottom: 18px; }

  .day-dot {
    position: absolute;
    left: -36px;
    top: 15px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    color: var(--text3);
    cursor: pointer;
    z-index: 2;
    transition: all .2s;
  }
  .day-dot.done { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }

  .day-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color .2s;
  }
  .day-card:hover { border-color: var(--border2); }

  .day-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: border-color .2s;
  }
  .day-header.open { border-bottom-color: var(--border); }

  .day-badge {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: .04em;
  }
  .day-title { font-size: 14px; font-weight: normal; color: var(--text); flex: 1; font-family: 'Georgia', serif; }
  .day-meta { font-size: 11px; color: var(--text3); font-family: 'Courier New', monospace; white-space: nowrap; }
  .chevron { font-size: 9px; color: var(--text3); transition: transform .2s; }
  .chevron.open { transform: rotate(90deg); }

  .day-body { padding: 16px; display: none; }
  .day-body.open { display: block; }

  .section-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .section-label:first-child { margin-top: 0; }

  .focus-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    font-style: italic;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .item:last-child { border-bottom: none; }

  .item-check {
    width: 15px;
    height: 15px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    transition: all .15s;
    background: var(--bg);
    font-family: monospace;
  }
  .item-check.checked { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }

  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 13px; color: var(--text); margin-bottom: 2px; line-height: 1.4; }
  .item-name a { color: var(--info-text); text-decoration: none; }
  .item-name a:hover { text-decoration: underline; }
  .item-sub { font-size: 11px; color: var(--text3); font-family: 'Courier New', monospace; line-height: 1.4; }

  .item-tag {
    font-size: 9px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .tag-essay { background: var(--info-bg); color: var(--info-text); border: 1px solid var(--info-border); }
  .tag-book  { background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-border); }
  .tag-talk  { background: var(--bg2); color: var(--text2); border: 1px solid var(--border2); }

  .insight {
    margin-top: 14px;
    padding: 10px 13px;
    background: var(--bg2);
    border-radius: var(--radius);
    border-left: 2px solid var(--border2);
    font-size: 12px;
    color: var(--text2);
    line-height: 1.65;
    font-style: italic;
  }
  .insight strong { color: var(--text); font-style: normal; }

  /* Day color badges */
  .d1 { background: #e6f1fb; color: #185fa5; border: 1px solid #b5d4f4; }
  .d2 { background: #e1f5ee; color: #0f6e56; border: 1px solid #9fe1cb; }
  .d3 { background: #faeeda; color: #854f0b; border: 1px solid #fac775; }
  .d4 { background: #eeedfe; color: #534ab7; border: 1px solid #cecbf6; }
  .d5 { background: #faece7; color: #993c1d; border: 1px solid #f5c4b3; }
  .d6 { background: #eaf3de; color: #3b6d11; border: 1px solid #c0dd97; }
  .d7 { background: #fbeaf0; color: #993556; border: 1px solid #f4c0d1; }

  @media (prefers-color-scheme: dark) {
    .d1 { background: #042c53; color: #b5d4f4; border-color: #185fa5; }
    .d2 { background: #04342c; color: #9fe1cb; border-color: #0f6e56; }
    .d3 { background: #412402; color: #fac775; border-color: #854f0b; }
    .d4 { background: #26215c; color: #cecbf6; border-color: #534ab7; }
    .d5 { background: #4a1b0c; color: #f5c4b3; border-color: #993c1d; }
    .d6 { background: #173404; color: #c0dd97; border-color: #3b6d11; }
    .d7 { background: #4b1528; color: #f4c0d1; border-color: #993556; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="page-header">
    <div class="eyebrow">Reading Roadmap · 7 Days</div>
    <h1>Peter Thiel — <em>Steal Everything</em></h1>
    <p>~1–2 hrs/day · Essays, books &amp; talks in the right order</p>
  </header>

  <div class="progress-wrap">
    <div class="progress-row">
      <span>Progress</span>
      <span id="prog-text">0 of 21 items</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  </div>

  <div class="timeline" id="timeline"></div>

</div>

<script>
const DAYS = [
  {
    label:"Day 1", cls:"d1",
    title:"The foundation — Zero to One",
    meta:"~2 hrs",
    focus:"Read the book that launched a thousand contrarians. Take notes on his 'secrets' framework and monopoly thesis.",
    items:[
      {name:"Zero to One",sub:"Ch. 1–7 · Competition is for losers, secrets, monopoly",tag:"book",url:"https://www.amazon.com/Zero-One-Notes-Startups-Future/dp/0804139296"},
      {name:"Competition Is for Losers",sub:"WSJ, 2014 · Companion essay, 10 min read",tag:"essay",url:"https://www.wsj.com/articles/peter-thiel-competition-is-for-losers-1410535536"},
      {name:"You Should Run Your Startup Like a Cult",sub:"Wired, 2014 · Company culture & secrets",tag:"essay",url:"https://www.wired.com/2014/09/run-startup-like-cult-heres/"}
    ],
    insight:"<strong>Core steal:</strong> Competition destroys value. Monopoly creates it. Every great company solves a unique problem — they hold secrets others don't believe."
  },
  {
    label:"Day 2", cls:"d2",
    title:"Zero to One — the big picture",
    meta:"~2 hrs",
    focus:"Finish the book and let the 'definite optimism' framing sink in. This is his worldview on technology and the future.",
    items:[
      {name:"Zero to One",sub:"Ch. 8–14 · Founders, definite optimism, the future",tag:"book",url:"https://www.amazon.com/Zero-One-Notes-Startups-Future/dp/0804139296"},
      {name:"You Are Not a Lottery Ticket (SXSW 2013)",sub:"Talk · Definite vs indefinite optimism",tag:"talk",url:"https://www.youtube.com/watch?v=iZM_JmZdqCw"}
    ],
    insight:"<strong>Core steal:</strong> Definite optimists have concrete plans. Indefinite optimists just hope something good happens. Most people are the latter — be the former."
  },
  {
    label:"Day 3", cls:"d3",
    title:"Diagnosing stagnation",
    meta:"~1.5 hrs",
    focus:"His two landmark essays on why progress slowed. Read back-to-back — they form a complete argument.",
    items:[
      {name:"The End of the Future",sub:"National Review, 2011 · Tech stagnation thesis",tag:"essay",url:"https://www.nationalreview.com/2011/10/end-future-peter-thiel/"},
      {name:"Swift Blind Horseman?",sub:"National Review, 2011 · Companion piece",tag:"essay",url:"https://nationalreview.com/magazine/2011/10/03/swift-blind-horseman"},
      {name:"The Optimistic Thought Experiment",sub:"Hoover, 2008 · Tech vs globalization",tag:"essay",url:"https://www.hoover.org/research/optimistic-thought-experiment"}
    ],
    insight:"<strong>Core steal:</strong> We accepted globalization (1→n copying) as a substitute for real technological progress (0→1 invention). They are not the same."
  },
  {
    label:"Day 4", cls:"d4",
    title:"Politics & philosophy",
    meta:"~1.5 hrs",
    focus:"His most controversial and philosophical writing. These will challenge your assumptions about democracy and freedom.",
    items:[
      {name:"The Education of a Libertarian",sub:"Cato Unbound, 2009 · Democracy vs freedom",tag:"essay",url:"https://www.cato-unbound.org/2009/04/13/peter-thiel/education-libertarian/"},
      {name:"The Straussian Moment",sub:"2007 PDF · Girard, Strauss, and modernity",tag:"essay",url:"https://gwern.net/doc/politics/2007-thiel.pdf"},
      {name:"Good for Google, Bad for America",sub:"NYT, 2019 · Tech and national interest",tag:"essay",url:"https://www.nytimes.com/2019/08/01/opinion/peter-thiel-google.html"}
    ],
    insight:"<strong>Core steal:</strong> His political philosophy flows from one root — he believes freedom and mass democracy are increasingly in conflict, and he bets on technology as the escape route."
  },
  {
    label:"Day 5", cls:"d5",
    title:"Religion, eschatology & big ideas",
    meta:"~2 hrs",
    focus:"His deepest and strangest ideas. Watch both Hoover Apocalypse talks — they are his most ambitious thinking.",
    items:[
      {name:"Apocalypse Now? Part I",sub:"Hoover Institution, Nov 2024 · Ancient prophecy & tech",tag:"talk",url:"https://www.youtube.com/watch?v=qqHueZNEzig"},
      {name:"Apocalypse Now? Part II",sub:"Hoover Institution, Dec 2024",tag:"talk",url:"https://www.youtube.com/watch?v=wTNI_lCvWZQ"},
      {name:"Against Edenism",sub:"First Things, 2015 · Technology vs nostalgia",tag:"essay",url:"https://www.firstthings.com/article/2015/06/against-edenism"}
    ],
    insight:"<strong>Core steal:</strong> He reads technology through a biblical/eschatological lens — AI and progress are forcing civilizational questions that can't be avoided."
  },
  {
    label:"Day 6", cls:"d6",
    title:"Long-form conversations",
    meta:"~2.5 hrs",
    focus:"Let him think out loud. These two conversations are the best entry point into his full worldview, unscripted.",
    items:[
      {name:"Joe Rogan Experience #2190",sub:"Aug 2024 · Most accessible 3hr conversation",tag:"talk",url:"https://www.youtube.com/watch?v=klRb0_BAX9g"},
      {name:"Conversations with Tyler",sub:"Apr 2024 · Deep on political theology & Girard",tag:"talk",url:"https://www.youtube.com/watch?v=vfbndRTlsg4"}
    ],
    insight:"<strong>Core steal:</strong> His thinking is always the same framework: mimetic desire, technological stagnation, the dangers of indefiniteness. Watch how he applies it to anything."
  },
  {
    label:"Day 7", cls:"d7",
    title:"Synthesize & steal",
    meta:"~1.5 hrs",
    focus:"Close the loop. Read his latest essay and the original lecture notes that predate the book — then write down what you're taking.",
    items:[
      {name:"A Time for Truth and Reconciliation",sub:"Financial Times, Jan 2025 · His most recent essay",tag:"essay",url:"https://www.ft.com/content/a46cb128-1f74-4621-ab0b-242a76583105"},
      {name:"CS183 original lecture notes",sub:"Blake Masters, 2012 · More raw than Zero to One",tag:"essay",url:"https://blakemasters.com/peter-thiels-cs183-startup"},
      {name:"Back to the Future",sub:"First Things, 2020 · Full circle on progress",tag:"essay",url:"https://www.firstthings.com/article/2020/03/back-to-the-future"}
    ],
    insight:"<strong>Your move:</strong> Write one page: what is the Thiel idea you most disagree with? What will you steal and apply? The best readers argue back."
  }
];

const TOTAL = DAYS.reduce((a,d)=>a+d.items.length,0);
const checked = new Set();

function updateProgress(){
  const pct = Math.round(checked.size/TOTAL*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-text').textContent = checked.size+' of '+TOTAL+' items';
}

function tagClass(t){ return t==='essay'?'tag-essay':t==='book'?'tag-book':'tag-talk'; }

function toggleDay(idx){
  const body=document.getElementById('body-'+idx);
  const hdr=document.getElementById('hdr-'+idx);
  const chev=document.getElementById('chev-'+idx);
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  hdr.classList.toggle('open',!open);
  if(chev) chev.classList.toggle('open',!open);
}

function buildDay(day,idx){
  const block=document.createElement('div');
  block.className='day-block';

  const dot=document.createElement('div');
  dot.className='day-dot';
  dot.id='dot-'+idx;
  dot.textContent='D'+(idx+1);
  dot.onclick=()=>toggleDay(idx);
  block.appendChild(dot);

  const card=document.createElement('div');
  card.className='day-card';

  const hdr=document.createElement('div');
  hdr.className='day-header';
  hdr.id='hdr-'+idx;
  hdr.onclick=()=>toggleDay(idx);

  const badge=document.createElement('span');
  badge.className='day-badge '+day.cls;
  badge.textContent=day.label;

  const title=document.createElement('span');
  title.className='day-title';
  title.textContent=day.title;

  const meta=document.createElement('span');
  meta.className='day-meta';
  meta.textContent=day.meta;

  const chev=document.createElement('span');
  chev.className='chevron';
  chev.id='chev-'+idx;
  chev.textContent='▶';

  hdr.appendChild(badge);
  hdr.appendChild(title);
  hdr.appendChild(meta);
  hdr.appendChild(chev);
  card.appendChild(hdr);

  const body=document.createElement('div');
  body.className='day-body';
  body.id='body-'+idx;

  const fl=document.createElement('div');
  fl.className='section-label';
  fl.textContent='Focus';
  body.appendChild(fl);

  const ft=document.createElement('div');
  ft.className='focus-text';
  ft.textContent=day.focus;
  body.appendChild(ft);

  const rl=document.createElement('div');
  rl.className='section-label';
  rl.textContent="Today's reading";
  body.appendChild(rl);

  day.items.forEach((item,iIdx)=>{
    const key=idx+'-'+iIdx;
    const row=document.createElement('div');
    row.className='item';

    const chk=document.createElement('div');
    chk.className='item-check';
    chk.id='chk-'+key;
    chk.onclick=e=>{
      e.stopPropagation();
      if(checked.has(key)){checked.delete(key);chk.classList.remove('checked');chk.textContent='';}
      else{checked.add(key);chk.classList.add('checked');chk.textContent='✓';}
      const allDone=day.items.every((_,ii)=>checked.has(idx+'-'+ii));
      document.getElementById('dot-'+idx).classList.toggle('done',allDone);
      updateProgress();
    };

    const info=document.createElement('div');
    info.className='item-info';

    const name=document.createElement('div');
    name.className='item-name';
    if(item.url){
      const a=document.createElement('a');
      a.href=item.url;
      a.target='_blank';
      a.rel='noopener noreferrer';
      a.textContent=item.name;
      name.appendChild(a);
    } else { name.textContent=item.name; }

    const sub=document.createElement('div');
    sub.className='item-sub';
    sub.textContent=item.sub;

    info.appendChild(name);
    info.appendChild(sub);

    const tag=document.createElement('span');
    tag.className='item-tag '+tagClass(item.tag);
    tag.textContent=item.tag;

    row.appendChild(chk);
    row.appendChild(info);
    row.appendChild(tag);
    body.appendChild(row);
  });

  const ins=document.createElement('div');
  ins.className='insight';
  ins.innerHTML=day.insight;
  body.appendChild(ins);

  card.appendChild(body);
  block.appendChild(card);
  return block;
}

const tl=document.getElementById('timeline');
DAYS.forEach((day,idx)=>tl.appendChild(buildDay(day,idx)));
toggleDay(0);
updateProgress();
</script>
</body>
</html>
